# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.35.0-standalone/service.json
apiVersion: v1
kind: Service
metadata:
  name: sandbox-router-svc
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agent-sandbox-router.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "agent-sandbox-router.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
