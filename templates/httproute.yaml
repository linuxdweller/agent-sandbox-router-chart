# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/gateway.networking.k8s.io/httproute_v1.json
{{- if .Values.httproute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.httproute.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "agent-sandbox-router.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.httproute.parentRef.name }}
      {{- if .Values.httproute.parentRef.namespace }}
      namespace: {{ .Values.httproute.parentRef.namespace }}
      {{- end }}
  {{- if .Values.httproute.hostname }}
  hostnames:
    - {{ .Values.httproute.hostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ''
          kind: Service
          name: sandbox-router-svc
          port: 8080
{{- end }}
